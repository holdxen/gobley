# JitPack build configuration for Gobley.
#
# This fork is at https://github.com/holdxen/gobley
#
jdk: 17
install:
  - ./gradlew
      :build-logic:gobley-gradle:publishToMavenLocal
      :build-logic:gobley-gradle-rust:publishToMavenLocal
      :build-logic:gobley-gradle-cargo:publishToMavenLocal
      :build-logic:gobley-gradle-uniffi:publishToMavenLocal
      --no-configuration-cache
      -x test
      -Pversion=$VERSION
      -Pgobley.publish.group=com.github.holdxen
      -Pgobley.projects.gradleTests=false
      -Pgobley.projects.uniffiTests=false
      -Pgobley.projects.uniffiTests.extTypes=false
      -Pgobley.projects.uniffiTests.futures=false
      -Pgobley.projects.examples.app=false
      -Pgobley.projects.examples.audioCppApp=false
      -Pgobley.projects.examples.customTypes=false
      -Pgobley.projects.examples.tokioBlake3App=false
      -Pgobley.projects.examples.tokioBoringApp=false
